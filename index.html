<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1080, initial-scale=1.0" />
  <meta name="description" content="BACK YOUR BODY launch countdown" />
  <title>BACK YOUR BODY Countdown</title>

  <style>
    :root {
      --bg: #02B596;
      --text: #FFFFFF;
      --confetti-1: #FCF2D1;
      --confetti-2: #FDCBE6;
      --confetti-3: #E8F7C8;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 1080px;
      height: 1080px;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      position: relative;
    }

    #wrapper {
      position: relative;
      width: 1080px;
      height: 1080px;
      overflow: hidden;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 70px;
      isolation: isolate;
    }

    #confetti-canvas {
      position: absolute;
      inset: 0;
      width: 1080px;
      height: 1080px;
      display: block;
      pointer-events: none;
      z-index: 0;
    }

    .timer {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 820px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 26px;
    }

    .main-title {
      font-family: "Arial Black", Arial, Helvetica, sans-serif;
      font-weight: 900;
      font-size: 150px;
      line-height: 0.88;
      text-transform: uppercase;
      color: var(--text);
      text-align: center;
    }

    .main-title span {
      display: block;
    }

    .subheading {
      width: 100%;
      font-family: Arial, Helvetica, sans-serif;
      font-weight: 400;
      font-size: 38px;
      text-transform: uppercase;
      color: var(--text);
      text-align: center;
      letter-spacing: 0.34em;
      padding-left: 0.34em;
      white-space: nowrap;
    }

    .countdown {
      width: 100%;
      display: flex;
      flex-wrap: nowrap;
      justify-content: center;
      align-items: flex-start;
      gap: 34px;
      margin-top: 12px;
      white-space: nowrap;
    }

    .time-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-width: 150px;
      flex: 0 0 auto;
    }

    .time-value {
      font-family: "Arial Black", Arial, Helvetica, sans-serif;
      font-weight: 900;
      font-size: 92px;
      line-height: 1;
      color: var(--text);
    }

    .time-label {
      margin-top: 12px;
      font-family: Arial, Helvetica, sans-serif;
      font-weight: 700;
      font-size: 24px;
      line-height: 1.1;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text);
      white-space: nowrap;
    }

    .live-message {
      font-family: "Arial Black", Arial, Helvetica, sans-serif;
      font-weight: 900;
      font-size: 72px;
      line-height: 1;
      text-transform: uppercase;
      color: var(--text);
      margin-top: 16px;
    }

    @media (prefers-reduced-motion: reduce) {
      #confetti-canvas {
        display: none !important;
      }
    }
  </style>
</head>
<body>
  <div id="wrapper">
    <canvas id="confetti-canvas" aria-hidden="true"></canvas>

    <main class="timer" aria-label="Launch countdown">
      <h1 class="main-title" id="main-title">
        <span>BACK</span>
        <span>YOUR</span>
        <span>BODY</span>
      </h1>

      <p class="subheading" id="subheading">LAUNCHING SOON</p>

      <section class="countdown" id="countdown" aria-live="polite">
        <div class="time-block">
          <div class="time-value" id="days">0</div>
          <div class="time-label">DAYS</div>
        </div>
        <div class="time-block">
          <div class="time-value" id="hours">0</div>
          <div class="time-label">HOURS</div>
        </div>
        <div class="time-block">
          <div class="time-value" id="minutes">0</div>
          <div class="time-label">MINUTES</div>
        </div>
        <div class="time-block">
          <div class="time-value" id="seconds">0</div>
          <div class="time-label">SECONDS</div>
        </div>
      </section>

      <div class="live-message" id="live-message" hidden>NOW LIVE</div>
    </main>
  </div>

  <script>
    (function () {
      "use strict";

      const targetTime = new Date("2026-04-07T23:00:00Z").getTime();

      const daysEl = document.getElementById("days");
      const hoursEl = document.getElementById("hours");
      const minutesEl = document.getElementById("minutes");
      const secondsEl = document.getElementById("seconds");
      const countdownEl = document.getElementById("countdown");
      const subheadingEl = document.getElementById("subheading");
      const liveMessageEl = document.getElementById("live-message");

      function pad(value) {
        return String(value).padStart(2, "0");
      }

      function updateCountdown() {
        const now = Date.now();
        const diff = targetTime - now;

        if (diff <= 0) {
          daysEl.textContent = "00";
          hoursEl.textContent = "00";
          minutesEl.textContent = "00";
          secondsEl.textContent = "00";
          subheadingEl.textContent = "LAUNCHED";
          countdownEl.hidden = true;
          liveMessageEl.hidden = false;
          return;
        }

        const totalSeconds = Math.floor(diff / 1000);
        const days = Math.floor(totalSeconds / 86400);
        const hours = Math.floor((totalSeconds % 86400) / 3600);
        const minutes = Math.floor((totalSeconds % 3600) / 60);
        const seconds = totalSeconds % 60;

        daysEl.textContent = String(days);
        hoursEl.textContent = pad(hours);
        minutesEl.textContent = pad(minutes);
        secondsEl.textContent = pad(seconds);
      }

      updateCountdown();
      setInterval(updateCountdown, 1000);

      const canvas = document.getElementById("confetti-canvas");
      const ctx = canvas.getContext("2d", { alpha: true });
      const colors = ["#FCF2D1", "#FDCBE6", "#E8F7C8"];
      const particles = [];
      const prefersReducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

      const width = 1080;
      const height = 1080;

      function resizeCanvas() {
        const ratio = Math.max(window.devicePixelRatio || 1, 1);
        canvas.width = Math.floor(width * ratio);
        canvas.height = Math.floor(height * ratio);
        canvas.style.width = width + "px";
        canvas.style.height = height + "px";
        ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
      }

      function createParticle() {
        return {
          x: Math.random() * width,
          y: -20 - Math.random() * height * 0.25,
          w: 8 + Math.random() * 10,
          h: 10 + Math.random() * 14,
          vx: -1.4 + Math.random() * 2.8,
          vy: 1.8 + Math.random() * 2.8,
          rotation: Math.random() * Math.PI * 2,
          vr: -0.08 + Math.random() * 0.16,
          color: colors[Math.floor(Math.random() * colors.length)]
        };
      }

      function seedParticles() {
        particles.length = 0;
        for (let i = 0; i < 90; i++) {
          const p = createParticle();
          p.y = Math.random() * height;
          particles.push(p);
        }
      }

      function step() {
        ctx.clearRect(0, 0, width, height);

        for (let i = 0; i < particles.length; i++) {
          const p = particles[i];
          p.x += p.vx;
          p.y += p.vy;
          p.rotation += p.vr;

          if (p.y > height + 24) {
            particles[i] = createParticle();
            particles[i].y = -20;
            continue;
          }

          if (p.x < -30) p.x = width + 30;
          if (p.x > width + 30) p.x = -30;

          ctx.save();
          ctx.translate(p.x, p.y);
          ctx.rotate(p.rotation);
          ctx.fillStyle = p.color;
          ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
          ctx.restore();
        }

        window.requestAnimationFrame(step);
      }

      resizeCanvas();

      if (!prefersReducedMotion) {
        seedParticles();
        step();
      }
    })();
  </script>
</body>
</html>
