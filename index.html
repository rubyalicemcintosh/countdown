<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Countdown Timer</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; }
        .countdown { font-size: 2em; margin: 20px; }
        @media (max-width: 600px) {
            .countdown { font-size: 1.5em; }
        }
    </style>
</head>
<body>
    <h1>Countdown to April 7, 2026</h1>
    <div class="countdown" id="countdown"></div>
    <script>
        const countdownDate = new Date("2026-04-07T23:00:00Z").getTime();
        const countdownElement = document.getElementById("countdown");
        const updateCountdown = () => {
            const now = new Date().getTime();
            const distance = countdownDate - now;
            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);
            countdownElement.innerHTML = `${days}d ${hours}h ${minutes}m ${seconds}s`;
            if (distance < 0) {
                clearInterval(interval);
                countdownElement.innerHTML = "Countdown finished!";
                // Trigger confetti animation here if needed
            }
        };
        const interval = setInterval(updateCountdown, 1000);
        updateCountdown();
    </script>
</body>
</html>
